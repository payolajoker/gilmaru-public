<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fdf4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.1">
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="342" y1="0" x2="342" y2="512"/>
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
  </g>
  
  <!-- Location Pin -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Pin body -->
    <path d="M0 -160 
             C-88 -160 -160 -88 -160 0 
             C-160 88 0 200 0 200 
             C0 200 160 88 160 0 
             C160 -88 88 -160 0 -160 Z" 
          fill="url(#pinGrad)"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="-20" r="60" fill="url(#bgGrad)"/>
    
    <!-- Inner dot -->
    <circle cx="0" cy="-20" r="24" fill="#ffffff"/>
  </g>
</svg>
